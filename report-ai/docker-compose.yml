services:
  mysql:
    image: mysql:8.0
    container_name: report-ai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: report_ai
      MYSQL_USER: reportai
      MYSQL_PASSWORD: reportai123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-ft-min-token-size=1
    networks:
      - report-ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: report-ai-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - report-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: report-ai-backend
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/report_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: reportai
      SPRING_DATASOURCE_PASSWORD: reportai123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: report-ai-jwt-secret-key-2026-must-be-long-enough-for-hs256
      JWT_EXPIRATION: 86400000
      LLM_PROVIDER: ${LLM_PROVIDER:-doubao}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      DOUBAO_ENDPOINT: ${DOUBAO_ENDPOINT:-}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-doubao-seed-2-0-lite-260215}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QINGTIAN_MCP_APPKEY: ${QINGTIAN_MCP_APPKEY:-OOn05z7m}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: report-ai-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - report-ai-network

volumes:
  mysql_data:
  redis_data:

networks:
  report-ai-network:
    driver: bridge
