services:
  mysql:
    image: mysql:8.0
    container_name: report-ai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: report_ai
      MYSQL_USER: reportai
      MYSQL_PASSWORD: reportai123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/snapshot.sql:/docker-entrypoint-initdb.d/02-snapshot.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-ft-min-token-size=1
      - --skip-character-set-client-handshake
      - --init-connect=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
    networks:
      - report-ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: report-ai-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - report-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: report-ai-es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=report-ai-cluster
      - node.name=es-node-1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - report-ai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    ulimits:
      memlock:
        soft: -1
        hard: -1

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: report-ai-kibana
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - report-ai-network
    profiles:
      - dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: report-ai-backend
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/report_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: reportai
      SPRING_DATASOURCE_PASSWORD: reportai123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      JWT_SECRET: report-ai-jwt-secret-key-2026-must-be-long-enough-for-hs256
      JWT_EXPIRATION: 86400000
      LLM_PROVIDER: ${LLM_PROVIDER:-doubao}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      DOUBAO_ENDPOINT: ${DOUBAO_ENDPOINT:-}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-doubao-seed-2-0-lite-260215}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QINGTIAN_MCP_APPKEY: ${QINGTIAN_MCP_APPKEY:-OOn05z7m}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-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}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - report-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: report-ai-frontend:latest
    container_name: report-ai-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - report-ai-network

volumes:
  mysql_data:
  redis_data:
  es_data:

networks:
  report-ai-network:
    driver: bridge
