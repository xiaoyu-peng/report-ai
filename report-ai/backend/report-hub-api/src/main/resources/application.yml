server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: report-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/report_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:reportai}
    password: ${SPRING_DATASOURCE_PASSWORD:reportai123}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6380}
      database: 0
      timeout: 5000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:report-ai-jwt-secret-key-2026-dev-must-be-long-enough-for-hs256}
  expiration: 86400000

report-ai:
  llm:
    provider: ${LLM_PROVIDER:doubao}
    doubao:
      base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      api-key: ${DOUBAO_API_KEY:}
      endpoint: ${DOUBAO_ENDPOINT:}
      model: ${DOUBAO_MODEL:doubao-seed-2-0-lite-260215}
      max-tokens: 4096
      timeout-seconds: 120
    claude:
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
      max-tokens: 4096
      timeout-seconds: 120

qingtian:
  mcp:
    appkey: ${QINGTIAN_MCP_APPKEY:OOn05z7m}
    search-url: ${QINGTIAN_SEARCH_URL:https://api-sc.wengegroup.com/search-mcp}
    sass-url: ${QINGTIAN_SASS_URL:https://api-sc.wengegroup.com/sass-mcp}
    connect-timeout: 5
    read-timeout: 30

tavily:
  api-key: ${TAVILY_API_KEY:}
  base-url: ${TAVILY_BASE_URL:https://api.tavily.com}

logging:
  level:
    com.reportai.hub: debug
    org.springframework.web: info
